<!DOCTYPE html>
<html>
<head>
  <title>Patient Search</title>
  <style>
    :root {
      --primary: #2A7DE1;
      --secondary: #E8F1FF;
      --accent: #00A8A8;
      --text: #1F2937;
      --card: #FFFFFF;
      --border: #c7dbfb;
    }
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { margin: 0; background: var(--secondary); color: var(--text); }
    .topbar {
      background: var(--primary);
      color: #fff;
      padding: 14px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 18px rgba(42, 125, 225, 0.28);
    }
    .topbar a {
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.16);
    }
    .container { max-width: 720px; margin: 34px auto; padding: 0 18px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(42, 125, 225, 0.12);
    }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p.subtitle { margin: 0 0 16px; color: #4b5563; }
    .error {
      margin: 0 0 14px;
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
    }
    label { font-weight: 700; }
    .form-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1;
      min-width: 260px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #f9fcff;
      color: var(--text);
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .footer-link { margin-top: 14px; }
    .footer-link a {
      text-decoration: none;
      color: var(--primary);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <strong>UHC Portal</strong>
    <a href="{% url 'dashboard' %}">Dashboard</a>
  </div>

  <div class="container">
    <div class="card">
      <h1>Search Patient by NFC UID</h1>
      <p class="subtitle">Enter the patient NFC ID to open their medical profile.</p>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label>NFC UID</label>
        <div class="form-row">
          <input type="text" name="nfc_uid" placeholder="Example: NFC001" required>
          <button type="submit">Search</button>
        </div>
      </form>

      <p class="footer-link"><a href="{% url 'dashboard' %}">Back to Dashboard</a></p>
    </div>
  </div>
</body>
</html>
